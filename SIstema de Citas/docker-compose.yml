services:
  db:
    image: postgres:16-alpine
    container_name: citas-db
    environment:
      - POSTGRES_USER=citas_user
      - POSTGRES_PASSWORD=citas_pass
      - POSTGRES_DB=citas_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citas_user -d citas_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      - AUTH_DB_DSN=postgresql://citas_user:citas_pass@db:5432/citas_db
      - JWT_SECRET=super_secret_for_dev
      - JWT_EXP_MINUTES=180
    depends_on:
      db:
        condition: service_healthy

  users-service:
    build: ./services/users-service
    container_name: users-service
    ports:
      - "8002:8002"
    environment:
      - USERS_DB_DSN=postgresql://citas_user:citas_pass@db:5432/citas_db
      - AUTH_SERVICE_URL=http://auth-service:8001
    depends_on:
      db:
        condition: service_healthy
      auth-service:
        condition: service_started

  appointments-service:
    build: ./services/appointments-service
    container_name: appointments-service
    ports:
      - "8003:8003"
    environment:
      - APPOINTMENTS_DB_DSN=postgresql://citas_user:citas_pass@db:5432/citas_db
      - AUTH_SERVICE_URL=http://auth-service:8001
      - USERS_SERVICE_URL=http://users-service:8002
    depends_on:
      db:
        condition: service_healthy
      auth-service:
        condition: service_started
      users-service:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: citas-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_AUTH_API=http://localhost:8001
      - VITE_USERS_API=http://localhost:8002
      - VITE_APPOINTMENTS_API=http://localhost:8003
    depends_on:
      - auth-service
      - users-service
      - appointments-service

volumes:
  pg_data:
